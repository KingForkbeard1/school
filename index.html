<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingforkbeard Academy of Chess</title>
    <style>
        /* Base Styles */
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            margin: 0; 
            background-color: #f4f7f6; 
            display: flex; 
            height: 100vh; 
        }
        
        /* Login View */
        #login-view { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 350px; 
            text-align: center; 
        }
        
        .login-box h2 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
        }
        
        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }
        
        .input-group label { 
            display: block; 
            margin-bottom: 5px; 
            color: #555; 
            font-weight: bold; 
        }
        
        .input-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        
        .btn { 
            width: 100%; 
            padding: 10px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px; 
        }
        
        .btn:hover { 
            background-color: #2980b9; 
        }

        /* Dashboard View (Hidden by default) */
        #dashboard-view { 
            display: none; 
            width: 100%; 
            height: 100%; 
        }
        
        .sidebar { 
            width: 250px; 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
        }
        
        .sidebar h3 { 
            text-align: center; 
            border-bottom: 1px solid #34495e; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }
        
        .nav-btn { 
            padding: 15px; 
            margin-bottom: 10px; 
            background-color: #34495e; 
            border-radius: 4px; 
            text-align: center; 
            cursor: pointer; 
        }
        
        .nav-btn.active { 
            background-color: #3498db; 
            font-weight: bold; 
        }
        
        .workspace { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .row { 
            display: flex; 
            gap: 20px; 
        }
        
        .col { 
            flex: 1; 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        
        /* Tables */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
        }
        
        th, td { 
            padding: 12px; 
            text-align: left; 
            border-bottom: 1px solid #ddd; 
        }
        
        th { 
            background-color: #f8f9fa; 
            color: #333; 
        }
        
        .error-msg { 
            color: #e74c3c; 
            font-size: 14px; 
            margin-bottom: 10px; 
            display: none; 
        }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="login-box">
            <h2>Academy Gateway</h2>
            <div id="login-error" class="error-msg">Invalid credentials.</div>
            <div class="input-group">
                <label>Staff Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Secure Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn" onclick="attemptLogin()">Secure Login</button>
        </div>
    </div>

    <div id="dashboard-view">
        <div class="sidebar">
            <h3>Kingforkbeard<br>Academy</h3>
            <div class="nav-btn active">Master Roster</div>
            <div class="nav-btn" onclick="logout()">Logout</div>
        </div>

        <div class="workspace">
            <div class="header" style="display: flex; justify-content: flex-end; align-items: center; gap: 15px; padding-bottom: 10px; border-bottom: 2px solid #ccc;">
                <div style="text-align: right;">
                    <strong>Welcome, Director Fury</strong>
                    <br>
                    <span style="background-color: #2c3e50; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; display: inline-block; margin-top: 4px;">Super Admin</span>
                </div>
                <div style="height: 40px; width: 40px; background-color: #3498db; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px;">
                    DF
                </div>
            </div>

            <div class="row">
                <div class="col" style="flex: 1;">
                    <h3>Enroll Student Module</h3>
                    <div id="enroll-msg" style="color: green; margin-bottom: 10px; display: none;">Student Enrolled!</div>
                    <div class="input-group">
                        <label>Admission No.</label>
                        <input type="text" id="admNo" placeholder="e.g. ADM-001">
                    </div>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Student Name">
                    </div>
                    <div class="input-group">
                        <label>Assigned Class</label>
                        <input type="text" id="className" placeholder="Class Name">
                    </div>
                    <button class="btn" onclick="enrollStudent()">Process Enrollment</button>
                </div>

                <div class="col" style="flex: 2;">
                    <h3>Master Roster</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Adm No</th>
                                <th>Student Name</th>
                                <th>Class</th>
                            </tr>
                        </thead>
                        <tbody id="roster-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Login Functionality
        function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('login-error');

            if(user === '' || pass === '') {
                errorMsg.innerText = "Please fill all fields.";
                errorMsg.style.display = "block";
                return;
            }

            fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'login', username: user, password: pass })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    sessionStorage.setItem('sys_token', data.token);
                    document.getElementById('login-view').style.display = 'none';
                    document.getElementById('dashboard-view').style.display = 'flex';
                    fetchStudents(); // Load the database records
                } else {
                    errorMsg.innerText = "Invalid credentials.";
                    errorMsg.style.display = "block";
                }
            });
        }

        // 2. Fetch Students (Read)
        function fetchStudents() {
            fetch('api.php?action=fetch_students', {
                method: 'GET'
            })
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('roster-body');
                tbody.innerHTML = '';
                if(data.status === 'success') {
                    data.data.forEach(student => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${student.admission_number}</td>
                                <td>${student.full_name}</td>
                                <td>${student.class_name}</td>
                            </tr>
                        `;
                    });
                }
            });
        }

        // 3. Enroll Student (Create)
        function enrollStudent() {
            const admNo = document.getElementById('admNo').value;
            const fullName = document.getElementById('fullName').value;
            const className = document.getElementById('className').value;

            if(!admNo || !fullName || !className) {
                alert("Please fill all enrollment fields.");
                return;
            }

            fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'enroll', admNo: admNo, fullName: fullName, className: className })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('enroll-msg').style.display = 'block';
                    document.getElementById('admNo').value = '';
                    document.getElementById('fullName').value = '';
                    document.getElementById('className').value = '';
                    fetchStudents(); // Instantly refresh the table
                    setTimeout(() => { document.getElementById('enroll-msg').style.display = 'none'; }, 3000);
                } else {
                    alert("Error: " + data.message);
                }
            });
        }

        // 4. Logout Functionality
        function logout() {
            sessionStorage.removeItem('sys_token');
            document.getElementById('dashboard-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
